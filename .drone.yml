pipeline:
  restore-cache:
    image: plugins/s3-cache:1
    pull: true
    endpoint: http://thunderbuild.hxr.team:9001
    secrets: [ aws_access_key_id, aws_secret_access_key ]
    restore: true

  build:
    image: alpine
    commands:
      - ls -la dir1
      - ls -la dir2

  rebuild-cache:
    image: plugins/s3-cache:1
    pull: true
    endpoint: http://thunderbuild.hxr.team:9001
    secrets: [ aws_access_key_id, aws_secret_access_key ]
    rebuild: true
    mount:
      - dir1
      - dir2
    when:
      event: push

  telegram:
    image: appleboy/drone-telegram
    token: $TELEGRAM_TOKEN
    to: $TELEGRAM_TO
    secrets: [ telegram_token, telegram_to ]
